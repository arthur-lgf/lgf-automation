name: Approvals Report

on:
  workflow_dispatch:
    inputs:
      output:
        description: "Send to Slack or save as a workflow artifact"
        required: false
        default: "slack"
        type: choice
        options:
          - slack
          - file
      date:
        description: "Optional M/D/YYYY override (default: today in ET)"
        required: false
        type: string
      period:
        description: "Report window (on-demand via /approvals). Blank/today = the scheduled daily run."
        required: false
        type: choice
        default: "today"
        options:
          - today
          - yesterday
          - last-week
          - last-month
      channel:
        description: "Slack channel ID to post to (default: the configured approvals channel)"
        required: false
        type: string
  # Scheduling is driven externally by cron-job.org, which calls this workflow's
  # workflow_dispatch REST endpoint at 11:00 AM America/New_York daily.
  # See docs/SCHEDULING.md for the trigger setup (same PAT/cron-job.org flow as
  # snapshot.yml; just point a new job at this workflow's /dispatches URL).

permissions:
  contents: read

jobs:
  approvals:
    name: Approvals Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install Playwright Chromium (with system deps)
        run: uv run playwright install --with-deps chromium

      - name: Write Google service-account credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run approvals report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          # On-demand /approvals passes a channel; otherwise the dedicated
          # approvals channel, then SLACK_CHANNEL_ID.
          APPROVALS_CHANNEL_ID: ${{ inputs.channel || secrets.APPROVALS_CHANNEL_ID }}
          # Optional: a dedicated bot for approvals. If unset, falls back to
          # SLACK_BOT_TOKEN. The bot must be a member of the target channel.
          APPROVALS_SLACK_BOT_TOKEN: ${{ secrets.APPROVALS_SLACK_BOT_TOKEN }}
          OUTPUT: ${{ inputs.output || 'slack' }}
          APPROVALS_DATE: ${{ inputs.date }}
          # On-demand window; blank -> the script's default (today).
          APPROVALS_PERIOD: ${{ inputs.period }}
        run: |
          if [ "$OUTPUT" = "file" ]; then
            uv run python scripts/approvals.py --output file --out-path approvals.png
          else
            uv run python scripts/approvals.py --output slack
          fi

      - name: Upload PNG as workflow artifact
        if: ${{ inputs.output == 'file' }}
        uses: actions/upload-artifact@v4
        with:
          name: approvals
          path: approvals.png
          if-no-files-found: error
          retention-days: 7
