name: Snapshot

on:
  workflow_dispatch:
    inputs:
      output:
        description: "Send to Slack or save as a workflow artifact"
        required: false
        default: "slack"
        type: choice
        options:
          - slack
          - file
  # 13:00 UTC = 9 AM ET during DST. GitHub schedules in UTC and may delay up to ~15 min.
  schedule:
    - cron: "0 13 * * 1-5"

permissions:
  contents: read

jobs:
  snapshot:
    name: ${{ matrix.report.title }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        report:
          - key: daily
            title: "Daily Sales Report"
            range: "B1:E25"
          - key: monthly
            title: "Monthly Sales Report"
            range: "G1:J25"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install Playwright Chromium (with system deps)
        run: uv run playwright install --with-deps chromium

      - name: Write Google service-account credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.report.title }} snapshot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SPREADSHEET_ID: "12glaANnP2BsQfH_kHfRlzA40JdWAU-PJgDT-56yRV8k"
          GID: "170384010"
          OUTPUT: ${{ inputs.output || 'slack' }}
          REPORT_RANGE: ${{ matrix.report.range }}
          REPORT_TITLE: ${{ matrix.report.title }}
          REPORT_KEY: ${{ matrix.report.key }}
        run: |
          if [ "$OUTPUT" = "file" ]; then
            uv run python scripts/snapshot.py \
              --spreadsheet-id "$SPREADSHEET_ID" \
              --gid "$GID" \
              --range "$REPORT_RANGE" \
              --title "$REPORT_TITLE" \
              --output file \
              --out-path "snapshot-${REPORT_KEY}.png"
          else
            uv run python scripts/snapshot.py \
              --spreadsheet-id "$SPREADSHEET_ID" \
              --gid "$GID" \
              --range "$REPORT_RANGE" \
              --title "$REPORT_TITLE" \
              --output slack
          fi

      - name: Upload PNG as workflow artifact
        if: ${{ inputs.output == 'file' }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.report.key }}
          path: snapshot-${{ matrix.report.key }}.png
          if-no-files-found: error
          retention-days: 7
