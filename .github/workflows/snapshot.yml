name: Snapshot

on:
  workflow_dispatch:
    inputs:
      output:
        description: "Send to Slack or save as a workflow artifact"
        required: false
        default: "slack"
        type: choice
        options:
          - slack
          - file
  # Schedule fires at both EDT and EST candidate times for 12:30 PM and 5 PM ET.
  # The preflight job below checks the live ET wall clock against a +/-35 min
  # window around each target, so only the runs that actually land near
  # 12:30 PM or 5 PM ET proceed to the snapshot matrix.
  #
  #   12:30 PM ET = 16:30 UTC (EDT) | 17:30 UTC (EST)
  #   5:00  PM ET = 21:05 UTC (EDT) | 22:05 UTC (EST)
  # (The 5 PM crons fire at :05 past the hour to dodge GitHub's on-the-hour
  # scheduler-load spike, which is the main source of long delays.)
  schedule:
    - cron: "30 16 * * *"
    - cron: "30 17 * * *"
    - cron: "5 21 * * *"
    - cron: "5 22 * * *"

permissions:
  contents: read

jobs:
  preflight:
    name: ET-hour preflight
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - id: guard
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Non-schedule trigger (${{ github.event_name }}) — proceeding."
            exit 0
          fi

          et_clock=$(TZ=America/New_York date '+%Y-%m-%d %H:%M %Z')
          et_h=$(TZ=America/New_York date +%H)
          et_m=$(TZ=America/New_York date +%M)
          et_total=$((10#$et_h * 60 + 10#$et_m))

          # Targets, in minutes since ET midnight
          target_a=750    # 12:30 PM ET
          target_b=1020   # 5:00  PM ET
          window=35       # +/- 35 min tolerance for GitHub scheduler delays

          run=false
          for target in $target_a $target_b; do
            diff=$(( et_total - target ))
            abs=${diff#-}
            if [ "$abs" -le "$window" ]; then
              run=true
              matched=$target
              break
            fi
          done

          if [ "$run" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::ET wall clock $et_clock is within +/-$window min of target ($matched min ET) — proceeding."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ET wall clock $et_clock is outside the 12:30 PM and 5 PM target windows — skipping snapshots."
          fi

  snapshot:
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    name: ${{ matrix.report.title }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        report:
          - key: daily
            title: "Daily Sales Report"
            range: "B1:E25"
          - key: monthly
            title: "Monthly Sales Report"
            range: "G1:J25"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install Playwright Chromium (with system deps)
        run: uv run playwright install --with-deps chromium

      - name: Write Google service-account credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.report.title }} snapshot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SPREADSHEET_ID: "12glaANnP2BsQfH_kHfRlzA40JdWAU-PJgDT-56yRV8k"
          GID: "170384010"
          OUTPUT: ${{ inputs.output || 'slack' }}
          REPORT_RANGE: ${{ matrix.report.range }}
          REPORT_TITLE: ${{ matrix.report.title }}
          REPORT_KEY: ${{ matrix.report.key }}
          ONLY_RANKED: "1"
        run: |
          if [ "$OUTPUT" = "file" ]; then
            uv run python scripts/snapshot.py \
              --spreadsheet-id "$SPREADSHEET_ID" \
              --gid "$GID" \
              --range "$REPORT_RANGE" \
              --title "$REPORT_TITLE" \
              --output file \
              --out-path "snapshot-${REPORT_KEY}.png"
          else
            uv run python scripts/snapshot.py \
              --spreadsheet-id "$SPREADSHEET_ID" \
              --gid "$GID" \
              --range "$REPORT_RANGE" \
              --title "$REPORT_TITLE" \
              --output slack
          fi

      - name: Upload PNG as workflow artifact
        if: ${{ inputs.output == 'file' }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.report.key }}
          path: snapshot-${{ matrix.report.key }}.png
          if-no-files-found: error
          retention-days: 7
