name: Snapshot

on:
  workflow_dispatch:
    inputs:
      output:
        description: "Send to Slack or save as a workflow artifact"
        required: false
        default: "slack"
        type: choice
        options:
          - slack
          - file
  # Schedule fires at both EDT and EST candidate times for 1 PM and 6 PM ET.
  # A preflight job below checks the live ET wall clock and skips the runs
  # that fall on the wrong side of DST, so the actual snapshots always go
  # out at 1 PM ET and 6 PM ET year-round.
  #
  #   1 PM ET = 17:00 UTC (EDT, Mar-Nov) | 18:00 UTC (EST, Nov-Mar)
  #   6 PM ET = 22:00 UTC (EDT, Mar-Nov) | 23:00 UTC (EST, Nov-Mar)
  schedule:
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"

permissions:
  contents: read

jobs:
  preflight:
    name: ET-hour preflight
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - id: guard
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Non-schedule trigger (${{ github.event_name }}) — proceeding."
            exit 0
          fi

          et_hour=$(TZ=America/New_York date +%H)
          et_clock=$(TZ=America/New_York date '+%Y-%m-%d %H:%M %Z')

          if [ "$et_hour" = "13" ] || [ "$et_hour" = "18" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::ET wall clock is $et_clock — matches 1 PM or 6 PM target, proceeding."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ET wall clock is $et_clock — not 1 PM or 6 PM, skipping snapshots."
          fi

  snapshot:
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    name: ${{ matrix.report.title }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        report:
          - key: daily
            title: "Daily Sales Report"
            range: "B1:E25"
          - key: monthly
            title: "Monthly Sales Report"
            range: "G1:J25"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install Playwright Chromium (with system deps)
        run: uv run playwright install --with-deps chromium

      - name: Write Google service-account credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.report.title }} snapshot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SPREADSHEET_ID: "12glaANnP2BsQfH_kHfRlzA40JdWAU-PJgDT-56yRV8k"
          GID: "170384010"
          OUTPUT: ${{ inputs.output || 'slack' }}
          REPORT_RANGE: ${{ matrix.report.range }}
          REPORT_TITLE: ${{ matrix.report.title }}
          REPORT_KEY: ${{ matrix.report.key }}
          ONLY_RANKED: "1"
        run: |
          if [ "$OUTPUT" = "file" ]; then
            uv run python scripts/snapshot.py \
              --spreadsheet-id "$SPREADSHEET_ID" \
              --gid "$GID" \
              --range "$REPORT_RANGE" \
              --title "$REPORT_TITLE" \
              --output file \
              --out-path "snapshot-${REPORT_KEY}.png"
          else
            uv run python scripts/snapshot.py \
              --spreadsheet-id "$SPREADSHEET_ID" \
              --gid "$GID" \
              --range "$REPORT_RANGE" \
              --title "$REPORT_TITLE" \
              --output slack
          fi

      - name: Upload PNG as workflow artifact
        if: ${{ inputs.output == 'file' }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.report.key }}
          path: snapshot-${{ matrix.report.key }}.png
          if-no-files-found: error
          retention-days: 7
