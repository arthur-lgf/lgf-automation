name: Snapshot

on:
  workflow_dispatch:
    inputs:
      report:
        description: "Which report(s) to snapshot"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - daily
          - monthly
      output:
        description: "Send to Slack or save as a workflow artifact"
        required: false
        default: "slack"
        type: choice
        options:
          - slack
          - file
  # 13:00 UTC = 9 AM ET during DST. GitHub schedules in UTC and may delay up to ~15 min.
  schedule:
    - cron: "0 13 * * 1-5"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install Playwright Chromium (with system deps)
        run: uv run playwright install --with-deps chromium

      - name: Write Google service-account credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run snapshots
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SPREADSHEET_ID: "12glaANnP2BsQfH_kHfRlzA40JdWAU-PJgDT-56yRV8k"
          GID: "170384010"
          REPORT_FILTER: ${{ inputs.report || 'all' }}
          OUTPUT: ${{ inputs.output || 'slack' }}
        run: |
          set -euo pipefail

          # Define the report set inline. Add more by appending {"key","title","range"} lines.
          reports='[
            {"key": "daily",   "title": "Daily Sales Report",   "range": "B1:E25"},
            {"key": "monthly", "title": "Monthly Sales Report", "range": "F1:J25"}
          ]'

          echo "$reports" | jq -c '.[]' | while read -r report; do
            key=$(echo   "$report" | jq -r '.key')
            title=$(echo "$report" | jq -r '.title')
            range=$(echo "$report" | jq -r '.range')

            if [ "$REPORT_FILTER" != "all" ] && [ "$REPORT_FILTER" != "$key" ]; then
              echo "::notice::Skipping $key (filter=$REPORT_FILTER)"
              continue
            fi

            echo "::group::$title ($range)"
            out_path="snapshot-${key}.png"
            if [ "$OUTPUT" = "file" ]; then
              uv run python scripts/snapshot.py \
                --spreadsheet-id "$SPREADSHEET_ID" \
                --gid "$GID" \
                --range "$range" \
                --title "$title" \
                --output file \
                --out-path "$out_path"
            else
              uv run python scripts/snapshot.py \
                --spreadsheet-id "$SPREADSHEET_ID" \
                --gid "$GID" \
                --range "$range" \
                --title "$title" \
                --output slack
            fi
            echo "::endgroup::"
          done

      - name: Upload PNGs as workflow artifact
        if: ${{ inputs.output == 'file' }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshots
          path: snapshot-*.png
          if-no-files-found: error
          retention-days: 7
